name: CICD
# on: [push]
on:
  push:
    branches: [ master ]     
    paths-ignore:          
      - '**.md'
permissions:
    contents: read
    packages: write
jobs: 
    CI:
        runs-on: ubuntu-latest
        env:
            Sln: CDTest.sln
            Configuration: Release
            UnitTest: CDTestxUnit/CDTestxUnit.csproj
            Playwright: CDTestPlaywright/CDTestPlaywright.csproj
            WebProject: CDTest/CDTest.csproj
        steps:
            - name: 步驟 1 - 下載程式碼到執行環境
              uses: actions/checkout@v4

            - name: 步驟 2 - 安裝 .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 8.0.x

            - name: 步驟 2.5 - 設定 NuGet 套件快取機制
              uses: actions/cache@v4
              with:
                path: ~/.nuget/packages
                key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
                restore-keys: |
                  ${{ runner.os }}-nuget-

            - name: 步驟 3 - 還原依賴 (Restore)
              run: dotnet restore ${{ env.Sln }}

            - name: 步驟 4 - 編譯專案 (Build)
              run: dotnet build ${{ env.Sln }} --configuration ${{ env.Configuration }} --no-restore

            # - name: 步驟 5 - 執行單元測試 (Test)
            #   run: dotnet test ${{ env.UnitTest }} --configuration ${{ env.Configuration }} --no-build --verbosity normal

            # - name: 步驟 5 - 執行Playwright (Test)
            #   run: |
            #     pwsh CDTestPlaywright/bin/${{ env.Configuration }}/net8.0/playwright.ps1 install
            #     dotnet run --project ${{ env.WebProject }} --configuration ${{ env.Configuration }} --no-build --urls "http://localhost:5114" &
            #     dotnet test ${{ env.Playwright }} --configuration ${{ env.Configuration }} --no-build --verbosity normal
        
            - name: 步驟 5-1 - 安裝 Playwright 瀏覽器元件
              run: pwsh CDTestPlaywright/bin/${{ env.Configuration }}/net8.0/playwright.ps1 install

            - name: 步驟 5-2 - 在背景啟動 Web 網頁主程式
              run: dotnet run --project ${{ env.WebProject }} --configuration ${{ env.Configuration }} --no-build --urls "http://localhost:5114" &
              
            - name: 步驟 5-3 - 執行 Playwright UI 自動化測試 (UI Test)
              run: dotnet test ${{ env.Playwright }} --configuration ${{ env.Configuration }} --no-build --verbosity normal
            # - name: 步驟 6 - 登入 GitHub 容器註冊表 
            #   uses: docker/login-action@v3
