name: CICD
on: [push]
permissions:
    contents: read
    packages: write
jobs: 
    CI:
        runs-on: ubuntu-latest
        env:
            Sln: CDTest.sln
            Configuration: Release
        steps:
            - name: ØBĘJ 1 - ¤Uøüµ{¦”½XØģ°õ¦ęĄō¹Ņ
              uses: actions/checkout@v4

            - name: ØBĘJ 2 - ¦wøĖ .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 8.0.x

            - name: ØBĘJ 3 - ĮŁ­ģØĢæą (Restore)
              run: dotnet restore ${{ env.Sln }}

            - name: ØBĘJ 4 - ½sÄ¶±M®× (Build)
              run: dotnet build ${{ env.Sln }} --configuration ${{ env.Configuration }} --no-restore

            - name: ØBĘJ 5 - °õ¦ę³ę¤ø“śøÕ (Test)
              run: dotnet test ${{ env.Sln }} --configuration ${{ env.Configuration }} --no-build --verbosity normal
        
            - name: ØBĘJ 6 - µn¤J GitHub ®e¾¹µł„UŖķ (GHCR)
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: ØBĘJ 7 - „“„]ØĆ±Ą°e¬M¹³ĄÉ (Build and Push Image)
              uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Dockerfile
                push: true              
                tags: |
                  ghcr.io/${{ github.repository }}/web-app:latest
                  ghcr.io/${{ github.repository }}/web-app:${{ github.run_number }}
